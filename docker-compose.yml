services:
  org-struct-postgres:
    image: postgres:17
    container_name: org-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=org_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d org_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    
  goose:
    image: golang:1.26.1
    container_name: org-goose

    depends_on:
      org-struct-postgres:
        condition: service_healthy

    working_dir: /app

    volumes:
      - .:/app

    command: >
      sh -c "
        go install github.com/pressly/goose/v3/cmd/goose@latest &&
        $(go env GOPATH)/bin/goose -dir migrations postgres 'host=org-struct-postgres port=5432 user=postgres password=postgres dbname=org_db sslmode=disable' up
      "
  app:
    build: .
    container_name: org-api

    depends_on:
      goose:
        condition: service_completed_successfully

    environment:
      DB_HOST: org-struct-postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: org_db
      APP_PORT: 8080

    ports:
      - "8080:8080"

    restart: always

volumes:
  postgres_data:
